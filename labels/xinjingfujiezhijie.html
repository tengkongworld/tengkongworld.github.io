<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <title>《心经》佛界之解</title>

    <style>

    #gallery-view {

        display: grid;

        grid-template-columns:

            repeat(

                auto-fill,

                minmax(

                    220px,

                    1fr

                )

            );

        gap: 16px;

    }

    .gallery-card {

        border: 1px solid #ddd;

        border-radius: 8px;

        overflow: hidden;

    }

    .gallery-card img {

        width: 100%;

        display: block;

    }

    .gallery-card p {

        padding: 10px;

        font-weight: bold;

    }

    </style>
</head>
<body
    data-default-view="list"
    data-default-sort="asc"
>
<p><a href="../index.html">首页</a> / 《心经》佛界之解</p><h1>《心经》佛界之解</h1>
<div id="reading-progress">
</div>

<div id="next-reading">
</div>

<p>
<button onclick="sortAsc()">正序</button>
<button onclick="sortDesc()">倒序</button>
</p>

<ul id="article-list">

        <li
            data-index="0"
            data-title="《心经》佛界之解1：前言，一场把《心经》讲“明白”的对话"
            data-image="../assets/images/5413274492346912939-1.jpg"
        >
            <span class="read-mark">○</span>

            <a href="../articles/2026-06-15-xinjingfujiezhijie1-5413274492346912939.html">
                《心经》佛界之解1：前言，一场把《心经》讲“明白”的对话
            </a>

        </li>
        
    </ul>



<script>                                       

function showListMode() {

    document.getElementById(
        "article-list"
    ).style.display = "block";

    document.getElementById(
        "gallery-view"
    ).style.display = "none";

    localStorage.setItem(
        "viewMode",
        "list"
    );

}

function rebuildGallery() {

    const gallery =
        document.getElementById(
            "gallery-view"
        );

    gallery.innerHTML = "";

    const galleryItems =
        document.querySelectorAll(
            "#article-list li"
        );

    galleryItems.forEach(item => {

        const image =
            item.dataset.image;

        const title =
            item.dataset.title;

        const link =
            item.querySelector(
                "a"
            ).href;

        gallery.innerHTML += `

<div class="gallery-card">

    <a href="${link}">

        <img
            src="${image}"
            alt="${title}"
        >

        <p>
            ${title}
        </p>

    </a>

</div>

`;

    });

}
                                        
function showGalleryMode() {

    document.getElementById(
        "article-list"
    ).style.display = "none";

    const gallery =
        document.getElementById(
            "gallery-view"
        );

    gallery.style.display =
        "grid";

    rebuildGallery();

    localStorage.setItem(
        "viewMode",
        "gallery"
    );

}
                    
function sortAsc() {

    const list =
        document.getElementById(
            "article-list"
        );

    const items =
        Array.from(
            list.children
        );

    items.sort(
        (a, b) =>
        Number(b.dataset.index)
        -
        Number(a.dataset.index)
    );

    list.innerHTML = "";

    items.forEach(item => {

        list.appendChild(item);

    });

    localStorage.setItem(
        "sortOrder",
        "asc"
    );

    if (
        document.getElementById(
            "gallery-view"
        ).style.display !== "none"
    ) {

        rebuildGallery();

    }

}                    

function sortDesc() {

    const list =
        document.getElementById(
            "article-list"
        );

    const items =
        Array.from(
            list.children
        );

    items.sort(
        (a, b) =>
        Number(a.dataset.index)
        -
        Number(b.dataset.index)
    );

    list.innerHTML = "";

    items.forEach(item => {

        list.appendChild(item);

    });

    localStorage.setItem(
        "sortOrder",
        "desc"
    );
    if (
    document.getElementById(
        "gallery-view"
    ).style.display !== "none"
    ) {

    rebuildGallery();

    }                

}

function initializeReadingHistory() {

    const history = JSON.parse(

        localStorage.getItem(

            "readingHistory"

        ) || "[]"

    );

    const readTitles = history.map(

        item => item.title

    );

    document

        .querySelectorAll(

            "li[data-title]"

        )

        .forEach(li => {

            const title =

                li.dataset.title;

            if (

                readTitles.includes(title)

            ) {

                li.querySelector(

                    ".read-mark"

                ).textContent = "✓";

            }

        });

    const totalArticles = document

        .querySelectorAll(

            "li[data-title]"

        ).length;

    const readCount = document

        .querySelectorAll(

            ".read-mark"

        );

    let finished = 0;

    readCount.forEach(mark => {

        if (

            mark.textContent === "✓"

        ) {

            finished++;

        }

    });

    const percent = Math.round(

        finished * 100 / totalArticles

    );

    document.getElementById(

        "reading-progress"

    ).innerHTML = `

        <p>

            已阅读：

            ${finished}

            /

            ${totalArticles}

            (${percent}%)

        </p>

    `;

}

function initializeSort() {

    const savedOrder =

        localStorage.getItem(
            "sortOrder"
        );

    if (
        savedOrder === "asc"
    ) {

        sortAsc();

        return;

    }

    if (
        savedOrder === "desc"
    ) {

        sortDesc();

        return;

    }

    const defaultSort =

        document.body.dataset.defaultSort;

    if (
        defaultSort === "desc"
    ) {

        sortDesc();

    } else {

        sortAsc();

    }

}
                    
                    function initializeView() {

    const savedView =

        localStorage.getItem(
            "viewMode"
        );

    if (
        savedView === "gallery"
    ) {

        showGalleryMode();

        return;

    }

    if (
        savedView === "list"
    ) {

        showListMode();

        return;

    }

    const defaultView =

        document.body.dataset.defaultView;

    if (
        defaultView === "gallery"
    ) {

        showGalleryMode();

    } else {

        showListMode();

    }

}

function initializePage() {

    initializeReadingHistory();

    initializeSort();

    initializeView();

}

initializePage();
                                                                                                  
</script>

</body>
</html>
