<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <title>《心经》佛界之解1</title>

    <style>

    #gallery-view {

        display: grid;

        grid-template-columns:

            repeat(

                auto-fill,

                minmax(

                    220px,

                    1fr

                )

            );

        gap: 16px;

    }

    .gallery-card {

        border: 1px solid #ddd;

        border-radius: 8px;

        overflow: hidden;

    }

    .gallery-card img {

        width: 100%;

        display: block;

    }

    .gallery-card p {

        padding: 10px;

        font-weight: bold;

    }

    </style>
</head>
<body>
<p><a href="../index.html">首页</a> / <a href="xinjingfujiezhijie.html">《心经》佛界之解</a> / 《心经》佛界之解1</p><h1>《心经》佛界之解1</h1>
<div id="reading-progress">
</div>

<div id="next-reading">
</div>

<p>
<button onclick="sortAsc()">正序</button>
<button onclick="sortDesc()">倒序</button>
</p>

<ul id="article-list">

        <li
            data-index="0"
            data-title="《心经》佛界之解1：前言，一场把《心经》讲“明白”的对话"
            data-image="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiYzxOOHJpdR_oPdOVe8uIpicJeo9-rEDuTplcrDTnE7S0ARpWSeRrxddy-kQ011ydNEFbqKsARQbNhWcp9JXSDDn7tqVDNBir3xqnqqRdUYurcmE7IqPFTkRXm8T1zAavhvHMM9ttydT8LwSIzhOb5suH79jh4ZbRNG1pl3uXP36iKnz7NC-P97Jatyg/w400-h640/%E5%BF%83%E7%BB%8F%E5%B0%81%E9%9D%A21.jpg"
        >
            <span class="read-mark">○</span>

            <a href="../articles/2026-06-15-xinjingfujiezhijie1-5413274492346912939.html">
                《心经》佛界之解1：前言，一场把《心经》讲“明白”的对话
            </a>

        </li>
        
    </ul>



<script>

function showListMode() {

    document.getElementById(
        "article-list"
    ).style.display = "block";

    document.getElementById(
        "gallery-view"
    ).style.display = "none";

}

function rebuildGallery() {

    const gallery =
        document.getElementById(
            "gallery-view"
        );

    gallery.innerHTML = "";

    const galleryItems =
        document.querySelectorAll(
            "#article-list li"
        );

    galleryItems.forEach(item => {

        const image =
            item.dataset.image;

        const title =
            item.dataset.title;

        const link =
            item.querySelector(
                "a"
            ).href;

        gallery.innerHTML += `

<div class="gallery-card">

    <a href="${link}">

        <img
            src="${image}"
            alt="${title}"
        >

        <p>
            ${title}
        </p>

    </a>

</div>

`;

    });

}
                                        
function showGalleryMode() {

    document.getElementById(
        "article-list"
    ).style.display = "none";

    const gallery =
        document.getElementById(
            "gallery-view"
        );

    gallery.style.display =
        "grid";

    rebuildGallery();

}
                    
function sortAsc() {

    const list =
        document.getElementById(
            "article-list"
        );

    const items =
        Array.from(
            list.children
        );

    items.sort(
        (a, b) =>
        Number(b.dataset.index)
        -
        Number(a.dataset.index)
    );

    list.innerHTML = "";

    items.forEach(item => {

        list.appendChild(item);

    });

    localStorage.setItem(
        "sortOrder",
        "asc"
    );

    if (
        document.getElementById(
            "gallery-view"
        ).style.display !== "none"
    ) {

        rebuildGallery();

    }

}                    

function sortDesc() {

    const list =
        document.getElementById(
            "article-list"
        );

    const items =
        Array.from(
            list.children
        );

    items.sort(
        (a, b) =>
        Number(a.dataset.index)
        -
        Number(b.dataset.index)
    );

    list.innerHTML = "";

    items.forEach(item => {

        list.appendChild(item);

    });

    localStorage.setItem(
        "sortOrder",
        "desc"
    );
    if (
    document.getElementById(
        "gallery-view"
    ).style.display !== "none"
    ) {

    rebuildGallery();

    }                

}

const history = JSON.parse(

    localStorage.getItem(
        "readingHistory"
    ) || "[]"

);            
                    
const readTitles = history.map(

    item => item.title

);

document
    .querySelectorAll(
        "li[data-title]"
    )
    .forEach(li => {

        const title =
            li.dataset.title;

        if (
            readTitles.includes(title)
        ) {

            li.querySelector(
                ".read-mark"
            ).textContent = "✓";

        }

    });   
const totalArticles = document
    .querySelectorAll(
        "li[data-title]"
    ).length;

const readCount = document
    .querySelectorAll(
        ".read-mark"
    );

let finished = 0;

readCount.forEach(mark => {

    if (
        mark.textContent === "✓"
    ) {

        finished++;

    }

});

const percent = Math.round(

    finished * 100 / totalArticles

);

document.getElementById(
    "reading-progress"
).innerHTML = `

    <p>

        已阅读：

        ${finished}
        /
        ${totalArticles}

        (${percent}%)

    </p>

`;

const savedOrder =

    localStorage.getItem(
        "sortOrder"
    );

if (
    savedOrder === "asc"
) {

    sortAsc();

}

if (
    savedOrder === "desc"
) {

    sortDesc();

}                                                                 
</script>

</body>
</html>
